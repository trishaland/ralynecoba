<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ralyne Play</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #bfe4ff;
      overflow-x: hidden;
    }

    /* ================= SUN MENU ================= */

    .sun-menu {
      position: fixed;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: #ffd966;
      border-bottom-left-radius: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 999;
      transition: 0.4s;
      overflow: hidden;
    }

    @keyframes rotateSun {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 🌙 MODE BULAN */
    .sun-menu.active {
      background: #f5f1e6;
    }

    .sun-menu.active::before {
      opacity: 0;
    }

    .sun-menu.active::after {
      content: "";
      position: absolute;
      width: 60px;
      height: 60px;
      background: #e8e2d3;
      border-radius: 50%;
      top: 20px;
      right: 20px;
      box-shadow: -25px 0 0 0 #f5f1e6;
      z-index: 1;
    }

    /* TEXT */
    .sun-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      font-weight: 700;
      color: #2b6cb0;
      transform: rotate(-20deg);
      transition: 0.3s;
      font-size: 20px;
      z-index: 2;
    }

    .sun-text span {
      display: block;
    }

    /* ================= MENU FULL SCREEN ================= */

    .menu-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: 0.5s;
      z-index: 998;
    }

    /* 🌌 NIGHT MODE */
    .menu-panel.active {
      right: 0;
      background: radial-gradient(circle at top, #1a1a2e, #0f172a);
      overflow: hidden;
    }

    /* MENU WARNA KUNING */
    .menu-panel.active a {
      color: #ffd966;
    }

    .menu-panel a {
      font-size: 32px;
      margin: 15px 0;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      position: relative;
      z-index: 2;
    }

    .menu-panel a:hover {
      transform: scale(1.1);
    }

    /* ================= STARS ================= */

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite ease-in-out alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; transform: scale(1); }
      to { opacity: 1; transform: scale(1.5); }
    }

    /* ================= HERO ================= */

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 10%;
      min-height: 100vh;
    }

    .hero-text {
      color: white;
    }

    .hero-text h1 {
      font-size: 60px;
      font-weight: 700;
    }

    .hero-text p {
      margin-top: 10px;
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 28px;
      background: #2b6cb0;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1a4f85;
    }

    /* HERO VIDEO */
    .hero-img {
      position: relative;
      width: 380px;
      height: 500px;
    }

    .blob {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      z-index: 2;
      border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%;
      animation: blobAnim 8s ease-in-out infinite;
    }

    .blob video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .shape-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #dff3ff;
      top: 0;
      left: 0;
      z-index: 1;
      border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%;
      animation: blobAnim 8s ease-in-out infinite;
    }

    .shape-outline {
      position: absolute;
      width: 105%;
      height: 105%;
      top: -10px;
      left: -10px;
      z-index: 3;
      pointer-events: none;
      border: 3px dashed #ffd966;
      border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%;
      animation: blobAnim 8s ease-in-out infinite;
    }

    @keyframes blobAnim {
      0% { border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%; }
      50% { border-radius: 60% 40% 45% 55% / 55% 60% 40% 45%; }
      100% { border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%; }
    }

    /* BUBBLES */
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      animation: float 5s ease-in-out infinite;
    }

    .bubble1 { width: 90px; height: 90px; background: #ffd966; top: 120px; left: 8%; }
    .bubble2 { width: 40px; height: 40px; background: white; top: 250px; left: 35%; animation-delay: 1s; }
    .bubble3 { width: 60px; height: 60px; background: #2b6cb0; bottom: 120px; right: 18%; animation-delay: 2s; }
    .bubble4 { width: 35px; height: 35px; background: white; bottom: 200px; left: 25%; animation-delay: 1.5s; }
    .bubble5 { width: 50px; height: 50px; background: #ffd966; top: 180px; right: 12%; animation-delay: 2.5s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* DIVIDER */
    .divider {
      position: relative;
      width: 100%;
      height: 150px;
      margin-top: -80px;
      z-index: 5;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: #7ecb89;
      border-top-left-radius: 50% 60%;
      border-top-right-radius: 50% 60%;
    }

    .tree {
      position: absolute;
      bottom: 60px;
      width: 20px;
      height: 60px;
      background: #8b5a2b;
    }

    .tree::before {
      content: "";
      position: absolute;
      bottom: 40px;
      left: -20px;
      width: 60px;
      height: 60px;
      background: #2f855a;
      border-radius: 50%;
    }

    .tree1 { left: 15%; }
    .tree2 { left: 45%; transform: scale(1.2); }
    .tree3 { right: 15%; }

    /* SECTION */
    .section1 {
      background: #f4fff7;
      padding: 100px 10%;
      text-align: center;
    }

    .section1 h2 {
      font-size: 40px;
      color: #2b6cb0;
    }

    .section1 p {
      margin-top: 10px;
      font-size: 18px;
      color: #444;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-img {
        width: 260px;
        height: 340px;
        margin-top: 30px;
      }

      .hero-text h1 {
        font-size: 42px;
      }
    }

/* ================= BIO SECTION ================= */

.bio-section {
  background: #83ca8b;
  padding: 80px 5%;
  position: relative;
  overflow: hidden;
}

.bio-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
}

/* KIRI */
.bio-left {
  flex: 1;
  display: flex;
  justify-content: center;
}

.bio-photo-wrap {
  position: relative;
  display: inline-block;
}

/* FRAME KAYU (GLOBAL) */
.wood-frame {
  background: #8b5a2b;
  padding: 12px;
  border-radius: 6px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  position: relative;
}

.wood-frame::before {
  content: "";
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 15px;
  height: 40px;
  background: #8b5a2b;
}

.wood-frame img {
  width: 180px;
  display: block;
  border-radius: 4px;
}

/* VERSI KECIL (BIAR SAMA TAPI LEBIH MINI) */
.wood-frame.small {
  transform: scale(0.85);
}

.wood-frame.small img {
  width: 160px;
}

/* ================= FOTO TAMBAHAN ================= */

.extra-photo {
  position: absolute;
  z-index: 1;
  animation: floatPhoto 4s ease-in-out infinite;
}

/* kiri */
.extra1 {
  top: -60px;
  left: -155px;
  --rot: -12deg;
}

/* kanan */
.extra2 {
  bottom: -60px;
  right: -155px;
  --rot: 12deg;
  animation-delay: 1s;
}

/* animasi */
@keyframes floatPhoto {
  0% {
    transform: translateY(0px) rotate(var(--rot));
  }
  50% {
    transform: translateY(-18px) rotate(var(--rot));
  }
  100% {
    transform: translateY(0px) rotate(var(--rot));
  }
}

/* ================= SUNGAI ================= */

.bio-river {
  flex: 1;
  height: 300px;
  background: linear-gradient(180deg, #4fc3f7, #0288d1);
  border-radius: 40% 60% 60% 40% / 50% 40% 60% 50%;
  position: relative;
}

.bio-river::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.3),
    rgba(255,255,255,0.3) 10px,
    transparent 10px,
    transparent 20px
  );
  border-radius: inherit;
}

/* ================= KANAN ================= */

.bio-right {
  flex: 1;
  color: #1a365d;
}

.bio-right h2 {
  font-size: 32px;
  margin-bottom: 20px;
}

.bio-card {
  background: white;
  padding: 20px 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.bio-card p {
  margin: 10px 0;
  font-size: 16px;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 900px) {
  .bio-container {
    flex-direction: column;
    text-align: center;
  }

  .bio-river {
    width: 100%;
    height: 200px;
  }

  .wood-frame img {
    width: 150px;
  }

  .wood-frame.small img {
    width: 110px;
  }

  .extra1 {
    left: -100px;
    top: -50px;
  }

  .extra2 {
    right: -100px;
    bottom: -50px;
  }
}

.calendar-section {
  background: #83ca8b;
  padding: 100px 10%;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.calendar-header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
}

.calendar-header button {
  background: #ffd966;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.today-btn {
  margin-bottom: 20px;
  background: #2b6cb0;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* kalender */
.calendar-box {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  max-width: 700px;
  margin: auto;
}

.day-name {
  font-weight: bold;
  color: #1a365d;
}

/* kotak tanggal */
.day {
  background: #ffd966;
  padding: 15px 5px;
  border-radius: 12px;
  font-weight: 600;
  position: relative;
  cursor: pointer;
  transition: 0.3s;
}

.day:hover {
  transform: scale(1.05);
}

/* hari ini */
.today {
  border: 3px solid #2b6cb0;
}

/* event */
.event {
  margin-top: 5px;
  font-size: 10px;
  background: #ff6b6b;
  color: white;
  padding: 2px 5px;
  border-radius: 5px;
}

/* kosong */
.empty {
  background: transparent;
  pointer-events: none;
}

/* ================= POPUP ================= */

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 9999;
}

.popup.active {
  opacity: 1;
  pointer-events: all;
}

.popup-content {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
  position: relative;
  animation: popupAnim 0.3s ease;
}

.popup-content img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  font-size: 18px;
}

@keyframes popupAnim {
  from {
    transform: scale(0.7);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
  </style>
</head>

    function toggleMenu() {

      menu.classList.toggle("active");

<script>
let currentDate = new Date();

// DATA EVENT
const events = {
  "2026-10-15": [
    {
      title: "🎂 Birthday Ralyne",
      time: "19:00 WIB",
      place: "Jakarta",
      desc: "Perayaan ulang tahun Ralyne bersama fans 🎉",
      image: "ralyneacara.jpg"
    }
  ],
  "2026-03-01": [
    {
      title: "📚 JKT48 School",
      time: "19:30 WIB",
      place: "Theater JKT48, FX Sudirman - Senayan Jakarta",
      desc: "Kegiatan belajar dan interaksi member",
      image: "ralyneacara.jpg"
    }
  ],
  "2026-03-08": [
    {
      title: "📚 JKT48 School",
      time: "19:30 WIB",
      place: "Theater JKT48, FX Sudirman - Senayan Jakarta",
      desc: "Kegiatan belajar dan interaksi member",
      image: "ralyneacara.jpg"
    }
  ],
  "2026-03-15": [
    {
      title: "📚 JKT48 School",
      time: "19:30 WIB",
      place: "Theater JKT48, FX Sudirman - Senayan Jakarta",
      desc: "Kegiatan belajar dan interaksi member",
      image: "ralyneacara.jpg"
    }
  ],
  "2026-02-22": [
    {
      title: "📚 JKT48 School",
      time: "19:30 WIB",
      place: "Theater JKT48, FX Sudirman - Senayan Jakarta",
      desc: "Kegiatan belajar dan interaksi member",
      image: "ralyneacara.jpg"
    }
  ]
};

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  const monthYear = document.getElementById("monthYear");

  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const today = new Date();

  const monthNames = [
    "Januari","Februari","Maret","April","Mei","Juni",
    "Juli","Agustus","September","Oktober","November","Desember"
  ];

  monthYear.innerText = `${monthNames[month]} ${year}`;

  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  days.forEach(day => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.innerText = day;
    calendar.appendChild(div);
  });

  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    empty.className = "empty";
    calendar.appendChild(empty);
  }

  for (let d = 1; d <= lastDate; d++) {
    const div = document.createElement("div");
    div.className = "day";

    const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    div.innerHTML = `<div>${d}</div>`;

    if (
      d === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ) {
      div.classList.add("today");
    }

    if (events[fullDate]) {
      events[fullDate].forEach(ev => {
        const evDiv = document.createElement("div");
        evDiv.className = "event";
        evDiv.innerText = ev.title;

        evDiv.onclick = () => openPopup(ev);

        div.appendChild(evDiv);
      });
    }

    calendar.appendChild(div);
  }
}

function changeMonth(step) {
  currentDate.setMonth(currentDate.getMonth() + step);
  renderCalendar();
}

function goToday() {
  currentDate = new Date();
  renderCalendar();
}

// ✅ POPUP FUNCTION (MASUK KE SCRIPT)
function openPopup(eventData) {
  document.getElementById("popup").classList.add("active");

  document.getElementById("popup-title").innerText = eventData.title;
  document.getElementById("popup-time").innerText = eventData.time;
  document.getElementById("popup-place").innerText = eventData.place;
  document.getElementById("popup-desc").innerText = eventData.desc;
  document.getElementById("popup-img").src = eventData.image;
}

function closePopup() {
  document.getElementById("popup").classList.remove("active");
}

// load pertama
renderCalendar();
</script>
