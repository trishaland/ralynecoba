<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ralyne Play</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #bfe4ff;
      overflow-x: hidden;
    }

    /* ================= SUN MENU ================= */

    .sun-menu {
      position: fixed;
      top: 0;
      right: 0;
      width: 140px;
      height: 140px;
      background: #ffd966;
      border-bottom-left-radius: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 999;
      transition: 0.4s;
      overflow: hidden;
    }

    @keyframes rotateSun {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 🌙 MODE BULAN */
    .sun-menu.active {
      background: #f5f1e6;
    }

    .sun-menu.active::before {
      opacity: 0;
    }

    .sun-menu.active::after {
      content: "";
      position: absolute;
      width: 90px;
      height: 90px;
      background: #e8e2d3;
      border-radius: 50%;
      top: 20px;
      right: 20px;
      box-shadow: -25px 0 0 0 #f5f1e6;
      z-index: 1;
    }

    /* TEXT */
    .sun-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      font-weight: 700;
      color: #2b6cb0;
      transform: rotate(-20deg);
      transition: 0.3s;
      font-size: 20px;
      z-index: 2;
    }

    .sun-text span {
      display: block;
    }

    /* ================= MENU FULL SCREEN ================= */

    .menu-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: 0.5s;
      z-index: 998;
    }

    /* 🌌 NIGHT MODE */
    .menu-panel.active {
      right: 0;
      background: radial-gradient(circle at top, #1a1a2e, #0f172a);
      overflow: hidden;
    }

    /* MENU WARNA KUNING */
    .menu-panel.active a {
      color: #ffd966;
    }

    .menu-panel a {
      font-size: 32px;
      margin: 15px 0;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      position: relative;
      z-index: 2;
    }

    .menu-panel a:hover {
      transform: scale(1.1);
    }

    /* ================= STARS ================= */

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite ease-in-out alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; transform: scale(1); }
      to { opacity: 1; transform: scale(1.5); }
    }

    /* ================= HERO ================= */

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 10%;
      min-height: 100vh;
    }

    .hero-text {
      color: white;
    }

    .hero-text h1 {
      font-size: 60px;
      font-weight: 700;
    }

    .hero-text p {
      margin-top: 10px;
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 28px;
      background: #2b6cb0;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1a4f85;
    }

    /* HERO VIDEO */
    .hero-img {
      position: relative;
      width: 380px;
      height: 500px;
    }

    .blob {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      z-index: 2;
      border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%;
      animation: blobAnim 8s ease-in-out infinite;
    }

    .blob video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .shape-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #dff3ff;
      top: 0;
      left: 0;
      z-index: 1;
      border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%;
      animation: blobAnim 8s ease-in-out infinite;
    }

    .shape-outline {
      position: absolute;
      width: 105%;
      height: 105%;
      top: -10px;
      left: -10px;
      z-index: 3;
      pointer-events: none;
      border: 3px dashed #ffd966;
      border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%;
      animation: blobAnim 8s ease-in-out infinite;
    }

    @keyframes blobAnim {
      0% { border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%; }
      50% { border-radius: 60% 40% 45% 55% / 55% 60% 40% 45%; }
      100% { border-radius: 42% 58% 55% 45% / 45% 40% 60% 55%; }
    }

    /* BUBBLES */
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      animation: float 5s ease-in-out infinite;
    }

    .bubble1 { width: 90px; height: 90px; background: #ffd966; top: 120px; left: 8%; }
    .bubble2 { width: 40px; height: 40px; background: white; top: 250px; left: 35%; animation-delay: 1s; }
    .bubble3 { width: 60px; height: 60px; background: #2b6cb0; bottom: 120px; right: 18%; animation-delay: 2s; }
    .bubble4 { width: 35px; height: 35px; background: white; bottom: 200px; left: 25%; animation-delay: 1.5s; }
    .bubble5 { width: 50px; height: 50px; background: #ffd966; top: 180px; right: 12%; animation-delay: 2.5s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* DIVIDER */
    .divider {
      position: relative;
      width: 100%;
      height: 150px;
      margin-top: -80px;
      z-index: 5;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: #7ecb89;
      border-top-left-radius: 50% 60%;
      border-top-right-radius: 50% 60%;
    }

    .tree {
      position: absolute;
      bottom: 60px;
      width: 20px;
      height: 60px;
      background: #8b5a2b;
    }

    .tree::before {
      content: "";
      position: absolute;
      bottom: 40px;
      left: -20px;
      width: 60px;
      height: 60px;
      background: #2f855a;
      border-radius: 50%;
    }

    .tree1 { left: 15%; }
    .tree2 { left: 45%; transform: scale(1.2); }
    .tree3 { right: 15%; }

    /* SECTION */
    .section1 {
      background: #f4fff7;
      padding: 100px 10%;
      text-align: center;
    }

    .section1 h2 {
      font-size: 40px;
      color: #2b6cb0;
    }

    .section1 p {
      margin-top: 10px;
      font-size: 18px;
      color: #444;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-img {
        width: 260px;
        height: 340px;
        margin-top: 30px;
      }

      .hero-text h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <!-- SUN MENU -->
  <div class="sun-menu" id="sun" onclick="toggleMenu()">
    <div class="sun-text" id="sunText">
      <span>ME</span>
      <span>NU</span>
    </div>
  </div>

  <!-- MENU PANEL -->
  <div class="menu-panel" id="menu">

    <!-- STARS -->
    <div class="stars">
      <div class="star" style="top:10%; left:20%;"></div>
      <div class="star" style="top:30%; left:70%;"></div>
      <div class="star" style="top:50%; left:40%;"></div>
      <div class="star" style="top:70%; left:80%;"></div>
      <div class="star" style="top:20%; left:90%;"></div>
      <div class="star" style="top:80%; left:10%;"></div>
      <div class="star" style="top:60%; left:60%;"></div>
      <div class="star" style="top:40%; left:15%;"></div>
    </div>

    <a href="#">Home</a>
    <a href="#">Tentang Ralyne</a>
    <a href="#">Corner</a>
  </div>

  <!-- bubbles -->
  <div class="bubble bubble1"></div>
  <div class="bubble bubble2"></div>
  <div class="bubble bubble3"></div>
  <div class="bubble bubble4"></div>
  <div class="bubble bubble5"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>Ralyne van Irwan</h1>
      <p>Official Playful Site</p>
      <a href="#" class="btn">Explore</a>
    </div>

    <div class="hero-img">
      <div class="shape-outline"></div>
      <div class="shape-bg"></div>

      <div class="blob">
        <video autoplay muted loop playsinline>
          <source src="ralynehome.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </section>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="ground"></div>
    <div class="tree tree1"></div>
    <div class="tree tree2"></div>
    <div class="tree tree3"></div>
  </div>

  <!-- SECTION -->
  <section class="section1">
    <h2>Welcome to Ralyne World</h2>
    <p>Tempat dimana setiap momen punya cerita.</p>
  </section>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("menu");
      const sun = document.getElementById("sun");
      const text = document.getElementById("sunText");

      menu.classList.toggle("active");
      sun.classList.toggle("active");

      if (menu.classList.contains("active")) {
        text.innerHTML = "<span>CLO</span><span>SE</span>";
      } else {
        text.innerHTML = "<span>ME</span><span>NU</span>";
      }
    }
  </script>

</body>
</html>
